<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Arus Kas Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 950px; margin: auto; }
        .login-box { position: fixed; top: 10px; left: 10px; background: white; padding: 10px; border-radius: 5px; z-index: 1000; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #2563eb; color: white; }
        .btn { cursor: pointer; padding: 6px; border: none; border-radius: 4px; background: #2563eb; color: white; margin-right: 5px; }
    </style>
</head>
<body>

<div class="login-box" id="loginBox">
    <input type="text" id="user" placeholder="User" style="width:60px">
    <input type="password" id="pass" placeholder="Pass" style="width:60px">
    <button onclick="login()">Login</button>
</div>

<div class="card">
    <h2>Data Arus Kas</h2>
    <div id="adminPanel" style="display:none; padding:10px; border:1px solid #ddd;">
        <button onclick="logout()" style="background:#dc2626">Logout</button>
        <select id="jenis"><option value="Pemasukan">Pemasukan</option><option value="Pengeluaran">Pengeluaran</option></select>
        <input type="text" id="ket" placeholder="Keterangan">
        <input type="number" id="saldo" placeholder="Nominal">
        <button id="btnSimpan" onclick="addData()">Simpan</button>
    </div>
    <button onclick="exportPDF()" style="margin-top:10px">Export PDF</button>
    <table id="kasTable">
        <thead><tr><th>Jenis</th><th>Tanggal</th><th>Keterangan</th><th>Nominal</th><th>Saldo Berjalan</th><th id="aksiHeader" style="display:none;">Aksi</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwVoRWVPJxo7hNWUNfgRJwvitoYIE8xeuSX3jOj-pgtefPxxK5aEueCPQaVUprM-lI1SQ/exec";
    let editIndex = null;
    const formatRp = (n) => new Intl.NumberFormat('id-ID', {style: 'currency', currency: 'IDR'}).format(n);
    
    function formatTanggal(tglInput) {
        const b = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const d = new Date(tglInput);
        return `${d.getDate()}/${b[d.getMonth()]}/${d.getFullYear()}`;
    }

    document.addEventListener("keypress", (e) => { if(e.key==="Enter") login(); });

    async function fetchData() {
        const res = await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'read'})});
        const data = await res.json();
        let bal = 0;
        const tbody = document.querySelector('#kasTable tbody');
        const isAdmin = localStorage.getItem('isLoggedIn');
        if(isAdmin) document.getElementById('aksiHeader').style.display = 'table-cell';

        tbody.innerHTML = data.map((r, i) => {
            bal += (r[1] === "Pemasukan" ? parseInt(r[4]) : -parseInt(r[4]));
            return `<tr style="background:${r[1] === 'Pengeluaran' ? '#fef9c3' : 'transparent'}">
                <td>${r[1]}</td><td>${formatTanggal(r[2])}</td><td>${r[3]}</td>
                <td>${formatRp(r[4])}</td><td>${formatRp(bal)}</td>
                ${isAdmin ? `<td><button class="btn" onclick="editData(${i+2}, '${r[1]}', '${r[3]}', '${r[4]}')">Edit</button>
                <button class="btn" onclick="hapusData(${i+2})" style="background:#dc2626">Hapus</button></td>` : ''}
            </tr>`;
        }).join('');
    }

    async function addData() {
        await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'add', jenis:document.getElementById('jenis').value, tanggal:new Date().toISOString(), ket:document.getElementById('ket').value, saldo:document.getElementById('saldo').value})});
        location.reload();
    }

    function editData(idx, jenis, ket, saldo) {
        editIndex = idx;
        document.getElementById('jenis').value = jenis;
        document.getElementById('ket').value = ket;
        document.getElementById('saldo').value = saldo;
        const btn = document.getElementById('btnSimpan');
        btn.innerText = "Update"; btn.onclick = updateData;
    }

    async function updateData() {
        await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'edit', rowIndex:editIndex, id:new Date().getTime(), jenis:document.getElementById('jenis').value, tanggal:new Date().toISOString(), ket:document.getElementById('ket').value, saldo:document.getElementById('saldo').value})});
        location.reload();
    }

    async function hapusData(row) {
        if(confirm('Yakin hapus?')) {
            await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'delete', rowIndex: row})});
            location.reload();
        }
    }

    function login() {
        if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "admin123") {
            localStorage.setItem('isLoggedIn', 'true');
            location.reload();
        } else alert("Login Gagal");
    }

    function logout() { localStorage.removeItem('isLoggedIn'); location.reload(); }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        document.getElementById('aksiHeader').style.display = 'none';
        document.querySelectorAll('#kasTable td:last-child').forEach(el => el.style.display = 'none');
        doc.text("LAPORAN ARUS KAS", 105, 15, { align: "center" });
        doc.autoTable({ html: '#kasTable', startY: 25 });
        doc.setFont("courier", "italic");
        doc.text("CREATED BY SOFYAN GANTENG", 105, doc.lastAutoTable.finalY + 10, { align: "center" });
        doc.save('Laporan_Kas.pdf');
        location.reload();
    }

    if(localStorage.getItem('isLoggedIn')) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('loginBox').style.display = 'none';
    }
    fetchData();
</script>
</body>
</html>
