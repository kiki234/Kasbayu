<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Kas Ubay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* CSS VARIABLE UNTUK WARNA FLAT DESIGN */
        :root {
            --primary: #3498db;
            --primary-hover: #2980b9;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --warning: #f39c12;
            --warning-hover: #e67e22;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --bg-color: #f8f9fa;
            --border: #bdc3c7;
            --row-expense: #fef9c3;
        }

        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--dark); padding: 15px; }
        
        /* KOTAK UTAMA (CARD) */
        .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--light); max-width: 1000px; margin: 10px auto; }
        
        /* HEADER UTAMA */
        .app-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--light); }
        .app-header h2 { font-weight: 600; font-size: 1.4rem; color: var(--dark); }

        /* KOTAK LOGIN FLAT */
        .login-box { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .login-box input { width: 100px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; background: var(--light); }
        
        /* PANEL ADMIN FLAT */
        .admin-panel { background: var(--light); padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; }
        .admin-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .form-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .form-group input, .form-group select { flex: 1 1 150px; padding: 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; }
        
        /* TOMBOL FLAT */
        button { cursor: pointer; border: none; padding: 10px 15px; border-radius: 4px; font-size: 14px; font-weight: 500; transition: background 0.2s ease; display: inline-flex; justify-content: center; align-items: center; gap: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover { background: var(--warning-hover); }
        
        /* TABEL RESPONSIVE */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 15px; border: 1px solid var(--light); border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--light); font-size: 14px; }
        th { background: var(--dark); color: white; font-weight: 500; white-space: nowrap; }
        tr:hover { background-color: var(--light); }
        .row-pengeluaran { background-color: var(--row-expense) !important; }
        
        .td-aksi { display: flex; gap: 5px; }

        /* MEDIA QUERIES UNTUK MOBILE */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .card { padding: 15px; margin: 0 auto; border: none; border-radius: 0; }
            .app-header h2 { font-size: 1.2rem; width: 100%; margin-bottom: 15px; text-align: center; }
            .login-box { width: 100%; justify-content: center; }
            .login-box input { flex: 1; }
            
            .form-group { flex-direction: column; }
            .form-group input, .form-group select, .form-group button { width: 100%; flex: unset; }
            
            .admin-panel-header { flex-direction: column; gap: 10px; text-align: center; }
            .admin-panel-header button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="app-header">
        <h2>Laporan Arus Kas </h2>
        
        <div class="login-box" id="loginBox">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-primary" onclick="login()">Log In</button>
        </div>
    </div>
    
    <div class="admin-panel" id="adminPanel">
        <div class="admin-panel-header">
            <strong style="color: var(--dark);">📝 Panel Administrator</strong>
            <button class="btn-danger" onclick="logout()">Logout</button>
        </div>
        <div class="form-group">
            <input type="date" id="tanggal" title="Pilih Tanggal Transaksi">
            <select id="jenis">
                <option value="Pemasukan">Pemasukan</option>
                <option value="Pengeluaran">Pengeluaran</option>
            </select>
            <input type="text" id="ket" placeholder="Keterangan Transaksi" style="flex: 2 1 200px;">
            <input type="number" id="saldo" placeholder="Nominal (Cth: 150000)">
            <button class="btn-primary" id="btnSimpan" onclick="tambahData()" style="flex: 1 1 100%;">Simpan</button>
            <button class="btn-warning" id="btnBatalEdit" onclick="batalEdit()" style="display:none; flex: 1 1 100%;">Batal Edit</button>
        </div>
    </div>
    
    <button class="btn-primary" onclick="exportPDF()" style="width: 100%; max-width: 200px;">📄 Export ke PDF</button>
    
    <div class="table-responsive">
        <table id="kasTable">
            <thead>
                <tr>
                    <th>Jenis</th>
                    <th>Tanggal</th>
                    <th>Keterangan</th>
                    <th>Nominal</th>
                    <th>Saldo Berjalan</th>
                    <th id="aksiHeader" style="display:none; width: 150px;">Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="6" style="text-align: center; padding: 20px;">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP ANDA DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbzfmmj1ujJaw_vn8XKsqsg-thG125cOzQVkF-a1zOP6J8nbrjiZAkJXln4M44CzsxC_Dg/exec"; 
    
    const formatRp = (angka) => new Intl.NumberFormat('id-ID', {
    style: 'currency', 
    currency: 'IDR',
    minimumFractionDigits: 0,
    maximumFractionDigits: 0
}).format(angka);
    
    function formatTanggal(tglString) {
        if (!tglString) return "-";
        const bulan = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
        const d = new Date(tglString);
        return `${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
    }

    let sedangEdit = false;
    let editRowIndex = null;
    let editId = null;

    function setTanggalHariIni() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        document.getElementById('tanggal').value = `${yyyy}-${mm}-${dd}`;
    }

    // FUNGSI RENDER TABEL UTAMA
    function renderTabel(data) {
        const tbody = document.querySelector('#kasTable tbody');
        const isAdmin = localStorage.getItem('isLoggedIn') === 'true';
        document.getElementById('aksiHeader').style.display = isAdmin ? 'table-cell' : 'none';
        
        let saldoBerjalan = 0;
        let barisHTML = '';

        data.forEach((baris, index) => {
            const nominal = parseInt(baris[4]) || 0;
            if (baris[1] === "Pemasukan") saldoBerjalan += nominal;
            else saldoBerjalan -= nominal;

            const kelasWarna = baris[1] === 'Pengeluaran' ? 'row-pengeluaran' : '';
            const rowIndex = index + 2; 

            barisHTML += `
            <tr class="${kelasWarna}">
                <td>${baris[1]}</td>
                <td>${formatTanggal(baris[2])}</td>
                <td>${baris[3]}</td>
                <td>${formatRp(nominal)}</td>
                <td style="font-weight: 600;">${formatRp(saldoBerjalan)}</td>
                ${isAdmin ? `
                <td class="td-aksi">
                    <button class="btn-warning" style="padding: 6px 10px;" onclick="siapkanEdit(${rowIndex}, '${baris[0]}', '${baris[1]}', '${baris[2]}', '${baris[3]}', ${nominal})">Edit</button>
                    <button class="btn-danger" style="padding: 6px 10px;" onclick="hapusData(${rowIndex})">Hapus</button>
                </td>` : ''}
            </tr>`;
        });

        if (data.length === 0) barisHTML = '<tr><td colspan="6" style="text-align: center; color: #7f8c8d;">Belum ada data transaksi.</td></tr>';
        tbody.innerHTML = barisHTML;
    }

    // FUNGSI MUAT DATA DENGAN SWR (CACHE LOKAL)
    async function muatData() {
        const dataLokal = localStorage.getItem('cacheKasLeoria');
        if (dataLokal) renderTabel(JSON.parse(dataLokal)); 

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'read' })
            });
            
            const dataServer = await response.json();
            localStorage.setItem('cacheKasLeoria', JSON.stringify(dataServer));
            renderTabel(dataServer);
        } catch (error) {
            if (!dataLokal) {
                document.querySelector('#kasTable tbody').innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--danger);">Gagal memuat data. Periksa koneksi internet Anda.</td></tr>';
            }
        }
    }

    async function tambahData() {
        const inputTanggal = document.getElementById('tanggal').value;
        const inputJenis = document.getElementById('jenis').value;
        const inputKet = document.getElementById('ket').value;
        const inputSaldo = document.getElementById('saldo').value;

        if (!inputTanggal || !inputKet || !inputSaldo) {
            alert("Tanggal, Keterangan, dan Nominal wajib diisi!");
            return;
        }

        const tombol = document.getElementById('btnSimpan');
        tombol.innerText = "Memproses...";
        tombol.disabled = true;

        const payload = {
            action: sedangEdit ? 'edit' : 'add',
            rowIndex: editRowIndex,
            id: sedangEdit ? editId : new Date().getTime(),
            jenis: inputJenis,
            tanggal: inputTanggal,
            ket: inputKet,
            saldo: inputSaldo
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            location.reload(); 
        } catch (error) {
            alert("Gagal menyimpan data.");
            tombol.innerText = sedangEdit ? "Update" : "Simpan";
            tombol.disabled = false;
        }
    }

    function siapkanEdit(rowIndex, id, jenis, tglAsli, ket, nominal) {
        sedangEdit = true;
        editRowIndex = rowIndex;
        editId = id;

        document.getElementById('jenis').value = jenis;
        document.getElementById('ket').value = ket;
        document.getElementById('saldo').value = nominal;

        if (tglAsli) {
            const d = new Date(tglAsli);
            document.getElementById('tanggal').value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        const btnSimpan = document.getElementById('btnSimpan');
        btnSimpan.innerText = "Update Transaksi";
        btnSimpan.className = "btn-warning"; 
        document.getElementById('btnBatalEdit').style.display = "inline-flex";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function batalEdit() {
        sedangEdit = false;
        editRowIndex = null;
        editId = null;
        document.getElementById('ket').value = "";
        document.getElementById('saldo').value = "";
        setTanggalHariIni();
        const btnSimpan = document.getElementById('btnSimpan');
        btnSimpan.innerText = "Simpan";
        btnSimpan.className = "btn-primary";
        document.getElementById('btnBatalEdit').style.display = "none";
    }

    async function hapusData(rowIndex) {
        if (confirm("Hapus data ini secara permanen?")) {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'delete', rowIndex: rowIndex })
                });
                location.reload();
            } catch (error) { alert("Gagal menghapus."); }
        }
    }

    function login() {
        if (document.getElementById('user').value === "admin" && document.getElementById('pass').value === "admin123") {
            localStorage.setItem('isLoggedIn', 'true');
            location.reload();
        } else { alert("User/Password salah!"); }
    }

    function logout() {
        localStorage.removeItem('isLoggedIn');
        location.reload();
    }

    document.getElementById('pass').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
    document.getElementById('user').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('pass').focus(); });

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const thAksi = document.getElementById('aksiHeader');
        const isAksiVisible = thAksi.style.display !== 'none';
        
        if (isAksiVisible) {
            thAksi.style.display = 'none';
            document.querySelectorAll('#kasTable tbody tr').forEach(tr => {
                if(tr.cells.length > 5) tr.cells[5].style.display = 'none';
            });
        }

        doc.setFont("helvetica", "bold");
        // Judul laporan PDF sekarang lebih relevan
        doc.text("LAPORAN ARUS KAS", 105, 15, { align: "center" });
        
        doc.autoTable({ 
            html: '#kasTable', 
            startY: 25,
            theme: 'grid',
            headStyles: { fillColor: [44, 62, 80] },
            styles: { fontSize: 9 }
        });
        
        const finalY = doc.lastAutoTable.finalY || 100;
        doc.setFont("courier", "italic");
        doc.setTextColor(150, 150, 150);
        doc.text("CREATED BY SOFYAN GANTENG", 105, finalY + 15, { align: "center" });
        
        doc.save('Laporan_Kas.pdf');
        
        if (isAksiVisible) {
            thAksi.style.display = 'table-cell';
            document.querySelectorAll('#kasTable tbody tr').forEach(tr => {
                if(tr.cells.length > 5) tr.cells[5].style.display = 'table-cell';
            });
        }
    }

    if (localStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('loginBox').style.display = 'none';
        setTanggalHariIni();
    }
    
    muatData();
</script>
</body>
</html>
